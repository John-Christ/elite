<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kiddy Planet – Plateforme LMS Élite</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
    .dark .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .rubric-header { height: 160px; background-size: cover; background-position: center; border-radius: 1rem; position: relative; overflow: hidden; margin-bottom: 2rem; }
    .rubric-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(15,23,42,0.9), transparent); }
    .rubric-title { position: absolute; bottom: 20px; left: 30px; z-index: 10; font-size: 2rem; font-weight: 800; color: white; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden bg-slate-50 text-slate-800 dark:bg-[#0f172a] dark:text-cbd5e1 transition-colors duration-300">

  <!-- MODAL SYSTEM -->
  <div id="customModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative w-full max-w-md glass bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-2xl fade-in flex flex-col">
      <h3 id="modalTitle" class="text-xl font-bold text-slate-900 dark:text-white mb-4"></h3>
      <div id="modalBody" class="text-slate-600 dark:text-slate-300 text-sm mb-6 flex-1"></div>
      <div id="modalActions" class="flex justify-end gap-3 mt-auto"></div>
    </div>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden fixed inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-[300] flex items-center justify-center">
    <div class="text-center">
      <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-xs font-bold text-cyan-600 dark:text-cyan-400 tracking-[0.2em] uppercase" id="loaderText">Synchronisation...</p>
    </div>
  </div>

  <!-- ULTRA PRO LOGIN -->
  <div id="authPortal" class="fixed inset-0 z-50 flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center">
    <div class="absolute inset-0 bg-white/90 dark:bg-slate-900/80 backdrop-blur-sm transition-colors"></div>
    <div class="relative w-full max-w-md glass bg-white/80 dark:bg-slate-800/80 rounded-3xl p-10 shadow-2xl text-center mx-4">
      <div class="w-20 h-20 mx-auto bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2" id="lang-login-title">Kiddy Planet</h1>
      
      <div id="authErrorMessage" class="hidden bg-rose-500/20 text-rose-600 dark:text-rose-200 p-3 text-sm rounded-xl mb-6"></div>
      
      <form onsubmit="handleLogin(event)" class="space-y-5 text-left">
        <div>
          <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Email</label>
          <input type="email" id="emailInput" required class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-1 focus:ring-cyan-400 outline-none">
        </div>
        <div class="relative">
          <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" id="lang-login-pwd">Mot de Passe</label>
          <input type="password" id="passwordInput" required class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-1 focus:ring-cyan-400 outline-none">
          <button type="button" onclick="togglePassword()" class="absolute right-4 top-[34px] text-slate-500 hover:text-cyan-500">
             <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </button>
        </div>
        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 rounded-xl transition-all" id="lang-login-btn">S'authentifier</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appContainer" class="hidden flex-1 flex flex-col md:flex-row h-screen w-full relative">
    
    <!-- MOBILE HEADER -->
    <div class="md:hidden glass p-4 flex justify-between items-center z-40 border-b border-slate-200 dark:border-slate-800">
      <h1 class="font-bold text-lg text-slate-900 dark:text-white">Kiddy Planet</h1>
      <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="text-slate-800 dark:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="absolute md:relative w-72 glass border-r border-slate-200 dark:border-slate-800 flex flex-col h-full z-50 shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center gap-4">
        <div class="relative group cursor-pointer" onclick="openProfileModal()">
          <img id="userAvatar" src="" class="w-14 h-14 rounded-xl object-cover border border-slate-300 dark:border-slate-600 group-hover:opacity-50 transition-all">
          <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/40 rounded-xl">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
          </div>
        </div>
        <div class="overflow-hidden">
          <p id="userNameDisplay" class="text-sm font-bold text-slate-900 dark:text-white truncate"></p>
          <p id="userRoleBadge" class="text-[10px] uppercase tracking-widest text-cyan-600 dark:text-cyan-400 font-bold mt-1"></p>
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="navModules"></nav>
      
      <div class="p-4 border-t border-slate-200 dark:border-slate-800 flex gap-2">
        <button onclick="toggleTheme()" class="flex-1 py-3 bg-slate-200 dark:bg-slate-800 rounded-xl flex justify-center text-slate-700 dark:text-slate-300 hover:text-cyan-500">
           <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
        <button onclick="toggleLanguage()" class="flex-1 py-3 bg-slate-200 dark:bg-slate-800 rounded-xl flex justify-center text-slate-700 dark:text-slate-300 font-bold text-sm" id="langBtn">EN</button>
        <button onclick="location.reload()" class="flex-1 py-3 bg-rose-100 dark:bg-rose-500/10 rounded-xl flex justify-center text-rose-500 hover:bg-rose-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white dark:bg-[#0f172a] transition-colors">
      <header class="hidden md:flex glass h-20 px-8 items-center justify-between shrink-0 sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800">
        <h3 id="viewTitle" class="text-xl font-bold text-slate-900 dark:text-white">Tableau de Bord</h3>
      </header>
      
      <!-- DYNAMIC CONTENT VIEW -->
      <div id="viewContainer" class="p-4 md:p-8 w-full max-w-7xl mx-auto overflow-y-auto h-full pb-32 fade-in"></div>
    </main>
  </div>

  <script>
    // ==========================================
    // CONFIGURATION & STATE
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxXOGASuSXE_HWZG9dDIQuuap0VjpP3MpXHiG0jXJvbQUeIvCxeohYIOVg6-xDuoxV-/exec"; 
    
    let currentUser = null;
    let lmsData = null;
    let currentLang = 'fr';
    
    const dict = {
      fr: { dashboard: "Dashboard", users: "Gestion Utilisateurs", portfolio: "Portfolio Social", save: "Enregistrer", upload: "Uploader Fichier", delete: "Supprimer", edit: "Modifier" },
      en: { dashboard: "Dashboard", users: "User Management", portfolio: "Social Portfolio", save: "Save", upload: "Upload File", delete: "Delete", edit: "Edit" }
    };

    const modules = [
      { id: 'dashboard', label: 'dashboard', icon: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v8a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z', roles: ['admin', 'teacher', 'student', 'parent'] },
      { id: 'users', label: 'users', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z', roles: ['admin'] },
      { id: 'portfolio', label: 'portfolio', icon: 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z', roles: ['admin', 'teacher', 'student', 'parent'] }
      // Add other modules (library, communication, etc.) with role restrictions
    ];

    // ==========================================
    // UTILITIES & UI
    // ==========================================
    function toggleLoader(show, text = "Synchronisation...") {
      document.getElementById('loaderText').textContent = text;
      document.getElementById('loader').classList[show ? 'remove' : 'add']('hidden');
    }

    function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    
    function toggleLanguage() {
      currentLang = currentLang === 'fr' ? 'en' : 'fr';
      document.getElementById('langBtn').textContent = currentLang === 'fr' ? 'EN' : 'FR';
      renderSidebar();
      if(currentUser) routeView(document.querySelector('.active-nav')?.id.split('-')[1] || 'dashboard');
    }

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showModal(title, bodyHtml, actionsHtml) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      document.getElementById('modalActions').innerHTML = actionsHtml;
      document.getElementById('customModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('customModal').classList.add('hidden'); }

    // ==========================================
    // BACKEND COMMUNICATION
    // ==========================================
    async function callBackend(action, payload) {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action, payload }) });
      return await res.json();
    }

    async function handleFileUpload(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const res = await callBackend('uploadFile', { base64: base64, filename: file.name, mimeType: file.type });
          res.success ? resolve(res.fileUrl) : reject(res.error);
        };
        reader.readAsDataURL(file);
      });
    }

    async function handleLogin(e) {
      e.preventDefault();
      toggleLoader(true);
      try {
        const res = await callBackend('authenticateUser', {
          email: document.getElementById('emailInput').value,
          password: document.getElementById('passwordInput').value
        });
        if (res.success) {
          currentUser = res.user;
          await refreshData();
          document.getElementById('authPortal').classList.add('hidden');
          document.getElementById('appContainer').classList.remove('hidden');
          document.getElementById('userNameDisplay').textContent = currentUser.name;
          document.getElementById('userRoleBadge').textContent = currentUser.role;
          document.getElementById('userAvatar').src = currentUser.profile_image || 'https://placehold.co/150';
          renderSidebar();
          routeView('dashboard');
        } else {
          document.getElementById('authErrorMessage').textContent = res.message;
          document.getElementById('authErrorMessage').classList.remove('hidden');
        }
      } catch (err) { showModal("Erreur", "Connexion serveur échouée.", `<button onclick="closeModal()" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 rounded-lg">Fermer</button>`); }
      toggleLoader(false);
    }

    async function refreshData() {
      const res = await callBackend('getLMSData', {});
      lmsData = res.data;
    }

    // ==========================================
    // MODULE: PROFILE UPLOAD
    // ==========================================
    function openProfileModal() {
      const body = `<input type="file" id="profilePicInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100">`;
      const actions = `
        <button onclick="closeModal()" class="px-4 py-2 text-slate-500">Annuler</button>
        <button onclick="uploadNewProfilePic()" class="px-4 py-2 bg-cyan-600 text-white rounded-lg font-bold">Uploader</button>
      `;
      showModal("Modifier Photo de Profil", body, actions);
    }

    async function uploadNewProfilePic() {
      const file = document.getElementById('profilePicInput').files[0];
      if (!file) return;
      closeModal();
      toggleLoader(true, "Upload vers Google Drive...");
      try {
        const fileUrl = await handleFileUpload(file);
        await callBackend('updateData', { sheetName: 'Users', id: currentUser.id, data: { profile_image: fileUrl } });
        document.getElementById('userAvatar').src = fileUrl;
        currentUser.profile_image = fileUrl;
        showModal("Succès", "Photo mise à jour avec succès !", `<button onclick="closeModal()" class="px-4 py-2 bg-cyan-600 text-white rounded-lg">OK</button>`);
      } catch(e) {
        showModal("Erreur", "Echec de l'upload.", `<button onclick="closeModal()" class="px-4 py-2 bg-slate-200 rounded-lg">Fermer</button>`);
      }
      toggleLoader(false);
    }

    // ==========================================
    // ROUTING & VIEWS
    // ==========================================
    function renderSidebar() {
      const nav = document.getElementById('navModules');
      nav.innerHTML = '';
      modules.forEach(m => {
        if (!m.roles.includes(currentUser.role)) return;
        const btn = document.createElement('button');
        btn.id = `btn-${m.id}`;
        btn.className = `nav-item w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold tracking-wide transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800`;
        btn.innerHTML = `<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${m.icon}"></path></svg> <span class="text-left truncate">${dict[currentLang][m.label]}</span>`;
        btn.onclick = () => routeView(m.id);
        nav.appendChild(btn);
      });
    }

    function routeView(viewId) {
      document.querySelectorAll('.nav-item').forEach(b => {
        b.classList.remove('bg-cyan-50', 'dark:bg-cyan-500/10', 'text-cyan-600', 'dark:text-cyan-400', 'active-nav');
      });
      const activeBtn = document.getElementById(`btn-${viewId}`);
      if(activeBtn) activeBtn.classList.add('bg-cyan-50', 'dark:bg-cyan-500/10', 'text-cyan-600', 'dark:text-cyan-400', 'active-nav');
      
      const titleConfig = modules.find(m => m.id === viewId);
      document.getElementById('viewTitle').textContent = dict[currentLang][titleConfig.label];
      
      const container = document.getElementById('viewContainer');
      container.innerHTML = '';
      container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');
      
      if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');

      if (viewId === 'dashboard') renderDashboard(container);
      if (viewId === 'users') renderUsersAdmin(container);
      if (viewId === 'portfolio') renderPortfolio(container);
    }

    // ==========================================
    // MODULE: ADMIN USER MANAGEMENT (CRUD)
    // ==========================================
    function renderUsersAdmin(container) {
      let html = `
        <div class="glass p-6 rounded-2xl mb-8 border border-slate-200 dark:border-slate-700">
          <h4 class="font-bold text-slate-900 dark:text-white mb-4">Ajouter un Utilisateur</h4>
          <form id="frmUser" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="uName" placeholder="Nom Complet" required class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
            <input type="email" id="uEmail" placeholder="Email" required class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
            <input type="password" id="uPwd" placeholder="Mot de passe" required class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
            <select id="uRole" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
              <option value="student">Élève</option><option value="teacher">Professeur</option><option value="admin">Administrateur</option><option value="parent">Parent</option>
            </select>
            <input type="text" id="uClass" placeholder="ID Classe (ex: C-101)" class="bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
            <button type="submit" class="md:col-span-3 bg-cyan-600 text-white font-bold py-2 rounded-xl">Créer Utilisateur</button>
          </form>
        </div>
        <div class="glass rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 overflow-x-auto">
          <table class="w-full text-left text-sm text-slate-600 dark:text-slate-300">
            <thead class="bg-slate-100 dark:bg-slate-900/80 text-slate-800 dark:text-white uppercase text-[10px]">
              <tr><th class="p-4">Nom</th><th class="p-4">Email</th><th class="p-4">Rôle</th><th class="p-4">Classe</th><th class="p-4">Actions</th></tr>
            </thead>
            <tbody class="divide-y divide-slate-200 dark:divide-slate-700/50">`;
      
      lmsData.users.forEach(u => {
        html += `
          <tr>
            <td class="p-4 font-bold dark:text-white">${u.name}</td><td class="p-4">${u.email}</td><td class="p-4 uppercase text-xs">${u.role}</td><td class="p-4">${u.class_id || '-'}</td>
            <td class="p-4 flex gap-2">
              <button onclick="deleteRecord('Users', '${u.id}', 'users')" class="px-3 py-1 bg-rose-500/20 text-rose-600 dark:text-rose-400 rounded hover:bg-rose-500 hover:text-white transition-all text-xs font-bold">Supprimer</button>
            </td>
          </tr>`;
      });
      container.innerHTML = html + `</tbody></table></div>`;

      document.getElementById('frmUser').onsubmit = async (e) => {
        e.preventDefault();
        await crudCreate('Users', {
          name: document.getElementById('uName').value, email: document.getElementById('uEmail').value,
          password: document.getElementById('uPwd').value, role: document.getElementById('uRole').value,
          class_id: document.getElementById('uClass').value, profile_image: ''
        }, 'users');
      };
    }

    // ==========================================
    // MODULE: PORTFOLIO (UPLOAD + CRUD)
    // ==========================================
    function renderPortfolio(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2071&auto=format&fit=crop');"><div class="rubric-title">${dict[currentLang].portfolio}</div></div>`;

      if (['admin', 'teacher', 'student'].includes(currentUser.role)) {
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-200 dark:border-slate-700">
            <form id="frmPort" class="space-y-4">
              <input type="text" id="pTitle" placeholder="Titre du projet..." required class="w-full bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none">
              <textarea id="pContent" placeholder="Description du projet..." required class="w-full bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 p-3 rounded-xl dark:text-white outline-none"></textarea>
              <div class="flex items-center gap-4">
                 <input type="file" id="pFile" accept="image/*,video/*" required class="flex-1 text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100">
                 <button type="submit" class="bg-cyan-600 text-white font-bold py-2 px-6 rounded-xl transition-all">Publier</button>
              </div>
            </form>
          </div>
        `;
      }

      html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
      lmsData.portfolio.forEach(post => {
        html += `
          <div class="glass rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 flex flex-col">
            <img src="${post.media_url}" class="w-full h-48 object-cover bg-slate-200 dark:bg-slate-800">
            <div class="p-5 flex-1 flex flex-col">
              <h4 class="text-xl font-bold text-slate-900 dark:text-white mb-2">${post.title}</h4>
              <p class="text-sm text-slate-600 dark:text-slate-400 mb-4 flex-1">${post.content}</p>
              <div class="flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest border-t border-slate-200 dark:border-slate-700 pt-3">
                <span>Par: ${post.author_id}</span>
                ${(currentUser.role === 'admin' || currentUser.id === post.author_id) ? `<button onclick="deleteRecord('Portfolio', '${post.id}', 'portfolio')" class="text-rose-500 hover:underline">Supprimer</button>` : ''}
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;

      document.getElementById('frmPort')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('pFile').files[0];
        toggleLoader(true, "Upload du fichier...");
        try {
          const fileUrl = await handleFileUpload(file);
          await crudCreate('Portfolio', {
            author_id: currentUser.id, class_id: currentUser.class_id || 'Global',
            type: file.type.includes('video') ? 'video' : 'image',
            media_url: fileUrl, title: document.getElementById('pTitle').value,
            content: document.getElementById('pContent').value, likes: 0
          }, 'portfolio');
        } catch(err) {
          showModal("Erreur", "Echec.", `<button onclick="closeModal()" class="px-4 py-2 bg-slate-200 rounded-lg">Fermer</button>`);
          toggleLoader(false);
        }
      });
    }

    // ==========================================
    // GLOBAL CRUD ACTIONS
    // ==========================================
    async function crudCreate(sheetName, dataObj, viewRoute) {
      toggleLoader(true);
      await callBackend('postData', { sheetName, data: dataObj });
      await refreshData();
      routeView(viewRoute);
      toggleLoader(false);
    }

    function deleteRecord(sheetName, id, viewRoute) {
      showModal("Confirmation", "Voulez-vous vraiment supprimer cet enregistrement ?", `
        <button onclick="closeModal()" class="px-4 py-2 text-slate-500">Annuler</button>
        <button onclick="confirmDelete('${sheetName}', '${id}', '${viewRoute}')" class="px-4 py-2 bg-rose-600 text-white rounded-lg font-bold">Confirmer</button>
      `);
    }

    async function confirmDelete(sheetName, id, viewRoute) {
      closeModal();
      toggleLoader(true);
      await callBackend('deleteData', { sheetName, id });
      await refreshData();
      routeView(viewRoute);
      toggleLoader(false);
    }

    // Placeholder Dashboard
    function renderDashboard(container) {
      container.innerHTML = `<div class="p-8 text-center text-slate-500"><h2 class="text-2xl font-bold mb-2">Bienvenue ${currentUser.name}</h2><p>Le module de tableau de bord est actif.</p></div>`;
    }
  </script>
</body>
</html>
