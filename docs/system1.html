<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Kiddy Planet – Plateforme LMS Élite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .brand-font { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col overflow-hidden">

  <div id="authPortal" class="flex-1 flex items-center justify-center p-6 sm:p-12 absolute inset-0 z-50 bg-slate-50">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">
      <div class="p-8 bg-gradient-to-br from-indigo-900 via-slate-900 to-indigo-950 text-center">
        <h1 class="brand-font text-2xl font-bold text-white tracking-tight">Kiddy Planet</h1>
        <p class="text-[10px] text-indigo-300 uppercase tracking-widest mt-1 font-bold">Système de Gestion de l'Apprentissage</p>
      </div>
      <div class="p-8 space-y-6">
        <div id="authErrorMessage" class="hidden bg-rose-50 border-l-4 border-rose-500 p-4 text-sm text-rose-700 rounded-r-lg"></div>
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Courriel Institutionnel</label>
            <input type="email" id="emailInput" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-slate-50">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Mot de passe</label>
            <input type="password" id="passwordInput" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-slate-50">
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all text-sm tracking-wide">
            Accéder à l'espace
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="appContainer" class="hidden flex-1 flex h-screen w-full">
    
    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col h-full shadow-2xl z-40 shrink-0 border-r border-slate-800 flex-none overflow-y-auto">
      <div class="p-6 bg-slate-950/40 border-b border-slate-800 sticky top-0 z-10 backdrop-blur-md">
        <h2 class="brand-font font-extrabold text-xl text-white">Kiddy Planet</h2>
        <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold block">International School Group</span>
      </div>
      
      <div class="px-6 py-5 bg-slate-900 border-b border-slate-800 flex items-center gap-4">
        <img id="userAvatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-500 bg-slate-800 shadow-lg">
        <div class="overflow-hidden">
          <p id="userNameDisplay" class="text-sm font-bold text-white truncate"></p>
          <p id="userRoleBadge" class="text-[10px] uppercase tracking-widest text-emerald-400 font-bold truncate"></p>
        </div>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-1" id="navModules"></nav>

      <div class="p-4 border-t border-slate-800 bg-slate-950/50 sticky bottom-0">
        <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold tracking-widest uppercase text-slate-400 hover:text-rose-400 rounded-xl hover:bg-rose-500/10 transition-all">
          Déconnexion
        </button>
      </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-hidden">
      <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 h-20 px-8 flex items-center justify-between shrink-0 sticky top-0 z-30 shadow-sm">
        <h3 id="viewTitle" class="brand-font font-extrabold text-2xl text-slate-800 tracking-tight">Aperçu</h3>
        <div class="text-right hidden md:block">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Cadre Pédagogique</p>
          <p class="text-sm font-bold text-indigo-600">IB PYP & MYP Network</p>
        </div>
      </header>
      
      <div id="viewContainer" class="p-8 w-full max-w-7xl mx-auto overflow-y-auto h-full pb-32 fade-in"></div>
    </main>
  </div>

  <div id="loader" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center">
    <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl">
      <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-xs font-bold text-slate-600 tracking-widest uppercase">Synchronisation...</p>
    </div>
  </div>

  <script>
    // ⚠️ INSEREZ VOTRE URL APPS SCRIPT ICI
    const API_URL = "https://script.google.com/macros/s/AKfycbx0l7wCNzhljaBS7gm8KTcmF0sfueCGRuZ1FzP9c5uzZxxGLYXYdadpRuyQZjYR9syQ/exec"; 
    
    let currentUser = null;
    let lmsData = null;

    const modules = [
      { id: 'apercu', label: 'Aperçu', icon: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6z' },
      { id: 'communiques', label: 'Communiqués de l\'école', icon: 'M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z' },
      { id: 'appel', label: 'Feuille d\'appel', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
      { id: 'affectations', label: 'Gestionnaire des affectations', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4' },
      { id: 'calendrier', label: 'Calendrier', icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' },
      { id: 'messagerie', label: 'Messagerie', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
      { id: 'bulletins', label: 'Bulletins de notes', icon: 'M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
      { id: 'politiques', label: 'Politiques & Ressources', icon: 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
      { id: 'objectifs', label: 'Objectifs des élèves', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6' },
      { id: 'bibliotheque', label: 'Bibliothèque scolaire', icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' },
      { id: 'planification', label: 'Aperçu de la planification', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
      { id: 'programmes', label: 'Cartes des programmes (IB)', icon: 'M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
      { id: 'emploi', label: 'Emploi du temps', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' },
      { id: 'cahier', label: 'Cahier de notes', icon: 'M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z' }
    ];

    function toggleLoader(show) {
      document.getElementById('loader').classList[show ? 'remove' : 'add']('hidden');
    }

    async function callBackend(action, payload) {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action, payload }) });
      return await res.json();
    }

    async function handleLogin(e) {
      e.preventDefault();
      toggleLoader(true);
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      
      try {
        const response = await callBackend('authenticateUser', { email, password });
        if (response.success) {
          currentUser = response.user;
          await bootLMS();
        } else {
          document.getElementById('authErrorMessage').textContent = response.message;
          document.getElementById('authErrorMessage').classList.remove('hidden');
          toggleLoader(false);
        }
      } catch (err) {
        alert("Erreur de connexion serveur.");
        toggleLoader(false);
      }
    }

    async function bootLMS() {
      try {
        lmsData = await callBackend('getLMSData', { role: currentUser.role, userId: currentUser.id });
        
        document.getElementById('authPortal').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');
        
        document.getElementById('userNameDisplay').textContent = currentUser.name;
        document.getElementById('userRoleBadge').textContent = currentUser.role;
        document.getElementById('userAvatar').src = currentUser.profile_image || 'https://placehold.co/100x100/4f46e5/fff?text=U';
        
        renderSidebar();
        routeView('apercu');
        toggleLoader(false);
      } catch (err) {
        alert("Erreur de chargement des données.");
        toggleLoader(false);
      }
    }

    function renderSidebar() {
      const nav = document.getElementById('navModules');
      modules.forEach(m => {
        const btn = document.createElement('button');
        btn.id = `btn-${m.id}`;
        btn.className = `w-full flex items-center gap-4 px-4 py-3 rounded-xl text-xs font-semibold tracking-wide transition-all text-slate-400 hover:text-white hover:bg-slate-800`;
        btn.innerHTML = `<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${m.icon}"></path></svg> <span class="text-left truncate">${m.label}</span>`;
        btn.onclick = () => routeView(m.id);
        nav.appendChild(btn);
      });
    }

    function routeView(viewId) {
      document.querySelectorAll('#navModules button').forEach(b => {
        b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        b.classList.add('text-slate-400');
      });
      document.getElementById(`btn-${viewId}`).classList.add('bg-indigo-600', 'text-white', 'shadow-md');
      document.getElementById(`btn-${viewId}`).classList.remove('text-slate-400');
      
      const titleConfig = modules.find(m => m.id === viewId);
      document.getElementById('viewTitle').textContent = titleConfig.label;
      
      const container = document.getElementById('viewContainer');
      container.innerHTML = '';
      container.classList.remove('fade-in');
      void container.offsetWidth; // trigger reflow
      container.classList.add('fade-in');

      // Routing Architecture
      if (viewId === 'apercu') renderApercu(container);
      else if (viewId === 'communiques') renderCommuniques(container);
      else if (viewId === 'programmes') renderCartesProgrammes(container);
      else renderPlaceholder(container, titleConfig.label); // Graceful degradation for untouched modules
    }

    // --- MODULE VIEWS ---

    function renderApercu(container) {
      let html = `
        <div class="mb-8 p-8 bg-indigo-600 rounded-3xl shadow-xl shadow-indigo-600/20 text-white relative overflow-hidden flex items-center justify-between">
          <div class="relative z-10">
            <h2 class="brand-font text-3xl font-extrabold mb-2">Bienvenue, ${currentUser.name}</h2>
            <p class="text-indigo-100 font-medium">Connecté en tant que: <span class="uppercase tracking-widest text-xs font-bold bg-indigo-800 px-2 py-1 rounded-md ml-1">${currentUser.role}</span></p>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Architecture du Curriculum</p>
            <h4 class="brand-font text-xl font-bold text-slate-800">PYP & MYP Matrix</h4>
          </div>
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Évaluation Intelligente</p>
            <h4 class="brand-font text-xl font-bold text-slate-800">Activée via AI</h4>
          </div>
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Unités Actives</p>
            <h4 class="brand-font text-xl font-bold text-slate-800">${lmsData.curriculumMaps ? lmsData.curriculumMaps.length : 0}</h4>
          </div>
        </div>
      `;
      container.innerHTML = html;
    }

    function renderCommuniques(container) {
      let formHtml = currentUser.role === 'teacher' || currentUser.role === 'administrator' ? `
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8">
          <h4 class="text-sm font-bold text-slate-800 mb-4">Créer un nouveau communiqué</h4>
          <form onsubmit="postAnn(event)" class="space-y-4">
            <input type="text" id="annTitle" placeholder="Titre du message" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500" required>
            <textarea id="annContent" placeholder="Contenu du communiqué..." rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500" required></textarea>
            <button type="submit" class="bg-indigo-600 text-white font-bold px-6 py-2 rounded-xl text-sm hover:bg-indigo-700 transition-all">Publier</button>
          </form>
        </div>
      ` : '';

      let listHtml = `<div class="space-y-4">`;
      (lmsData.announcements || []).forEach(ann => {
        listHtml += `
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all">
            <div class="flex justify-between items-center mb-3">
              <h5 class="font-bold text-slate-800 text-lg">${ann.title}</h5>
              <span class="text-xs font-semibold text-slate-400 bg-slate-100 px-3 py-1 rounded-lg">${ann.date || 'Récemment'}</span>
            </div>
            <p class="text-sm text-slate-600 whitespace-pre-line mb-4">${ann.content}</p>
            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 border-t border-slate-100 pt-3">
              Par: <span class="text-indigo-600">${ann.author}</span>
            </div>
          </div>
        `;
      });
      listHtml += `</div>`;
      container.innerHTML = formHtml + listHtml;
    }

    function renderCartesProgrammes(container) {
      // Integration of explicit IB Curriculum Data mapping requirements
      let html = `
        <div class="mb-8">
          <p class="text-sm text-slate-600 max-w-3xl">La cartographie des programmes est conçue pour lier les unités d'enseignement aux cadres internationaux du Baccalauréat International (IB), facilitant une évaluation flexible et basée sur la maîtrise.</p>
        </div>
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
      `;
      
      (lmsData.curriculumMaps || []).forEach(map => {
        let isPYP = map.framework === 'PYP';
        let badgeColor = isPYP ? 'bg-teal-100 text-teal-800' : 'bg-purple-100 text-purple-800';
        let structureLabel = isPYP ? 'Thème Transdisciplinaire' : 'Contexte Mondial';

        html += `
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
            <div>
              <div class="flex items-center gap-3 mb-4">
                <span class="px-3 py-1 text-xs font-bold uppercase tracking-widest rounded-lg ${badgeColor}">${map.framework}</span>
                <span class="text-xs font-mono font-bold text-slate-400">ID: ${map.id}</span>
              </div>
              <h4 class="brand-font font-bold text-xl text-slate-800 mb-1">${map.unit_focus}</h4>
              <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">${structureLabel}: <span class="text-indigo-600">${map.theme_or_context}</span></p>
              <p class="text-sm text-slate-600 leading-relaxed mb-6">${map.objectives}</p>
            </div>
            <button class="w-full bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold py-2 rounded-xl text-sm transition-all border border-slate-200">
              Ouvrir le Planificateur d'Unité
            </button>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;
    }

    function renderPlaceholder(container, title) {
      container.innerHTML = `
        <div class="flex flex-col items-center justify-center h-64 bg-white border border-dashed border-slate-300 rounded-3xl text-center p-8">
          <div class="w-16 h-16 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
          </div>
          <h4 class="brand-font font-bold text-slate-700 text-lg mb-1">Module "${title}" en développement</h4>
          <p class="text-xs font-medium text-slate-400 max-w-sm">Le moteur d'architecture Kiddy Planet configure actuellement cet espace pour une intégration transparente.</p>
        </div>
      `;
    }

    // --- FORM ACTIONS ---
    async function postAnn(e) {
      e.preventDefault();
      toggleLoader(true);
      const payload = {
        title: document.getElementById('annTitle').value,
        content: document.getElementById('annContent').value,
        author: currentUser.name,
        date: new Date().toLocaleDateString('fr-FR')
      };
      
      try {
        await callBackend('postAnnouncement', payload);
        // Refresh local memory and UI
        lmsData = await callBackend('getLMSData', { role: currentUser.role, userId: currentUser.id });
        routeView('communiques');
        toggleLoader(false);
      } catch (err) {
        alert("Erreur d'envoi.");
        toggleLoader(false);
      }
    }
  </script>
</body>
</html>
