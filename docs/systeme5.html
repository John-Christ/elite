<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiddy Planet – Plateforme LMS Élite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .rubric-header { height: 200px; background-size: cover; background-position: center; border-radius: 1rem; position: relative; overflow: hidden; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
    .rubric-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #0f172a, transparent); }
    .rubric-title { position: absolute; bottom: 20px; left: 30px; z-index: 10; font-size: 2.5rem; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

  <!-- ULTRA PRO LOGIN -->
  <div id="authPortal" class="fixed inset-0 z-50 flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center">
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-md glass rounded-3xl p-10 shadow-2xl border border-white/10 text-center">
      <div class="w-20 h-20 mx-auto bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-cyan-500/30">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-white mb-2 tracking-tight">Kiddy Planet</h1>
      <p class="text-xs text-cyan-400 uppercase tracking-[0.3em] mb-8 font-bold">Élite LMS Gateway</p>
      
      <div id="authErrorMessage" class="hidden bg-rose-500/20 border border-rose-500/50 text-rose-200 p-3 text-sm rounded-xl mb-6"></div>
      
      <form onsubmit="handleLogin(event)" class="space-y-5 text-left">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Email Institutionnel</label>
          <input type="email" id="emailInput" required class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition-all">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Mot de Passe</label>
          <input type="password" id="passwordInput" required class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition-all">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/25 transition-all tracking-wide mt-4">S'authentifier</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appContainer" class="hidden flex-1 flex h-screen w-full relative">
    
    <!-- SIDEBAR -->
    <aside class="w-72 glass border-r border-white/5 flex flex-col h-full z-40 shrink-0">
      <div class="p-6 border-b border-white/5 flex items-center gap-4">
        <div class="relative group cursor-pointer" onclick="changeProfilePhoto()">
          <img id="userAvatar" src="" class="w-14 h-14 rounded-xl object-cover border border-slate-600 group-hover:opacity-50 transition-all">
          <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </div>
        </div>
        <div class="overflow-hidden">
          <p id="userNameDisplay" class="text-sm font-bold text-white truncate"></p>
          <p id="userRoleBadge" class="text-[10px] uppercase tracking-widest text-cyan-400 font-bold mt-1"></p>
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="navModules"></nav>
      
      <div class="p-4 border-t border-white/5">
        <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold tracking-widest uppercase text-slate-400 hover:text-rose-400 rounded-xl hover:bg-rose-500/10 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Déconnexion
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-[#0f172a]">
      <header class="glass h-20 px-8 flex items-center justify-between shrink-0 sticky top-0 z-30 border-b border-white/5">
        <h3 id="viewTitle" class="text-xl font-bold text-white tracking-tight">Tableau de Bord</h3>
        <div class="relative w-96 hidden md:block">
          <input type="text" placeholder="Recherche globale..." class="w-full bg-slate-900/50 border border-slate-700 rounded-full py-2.5 pl-12 pr-4 text-sm text-slate-200 outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
          <svg class="w-4 h-4 absolute left-4 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </header>
      
      <div id="viewContainer" class="p-8 w-full max-w-7xl mx-auto overflow-y-auto h-full pb-32 fade-in"></div>
    </main>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center">
    <div class="text-center">
      <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4 shadow-lg shadow-cyan-500/50"></div>
      <p class="text-xs font-bold text-cyan-400 tracking-[0.2em] uppercase">Synchronisation Cloud...</p>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURATION & ETAT GLOBAL
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycby6wizkUXz5ueRnGA41YANZRqbgcUUuIRCobOL6DvhU6PhsoU5Otsx-wktTSsBr3ntlYA/exec"; 
    
    let currentUser = null;
    let lmsData = null;
    let myChildId = null; 
    let chartInstance = null;

    const modules = [
      { id: 'dashboard', label: 'Dashboard', icon: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v8a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z' },
      { id: 'portfolio', label: 'Portfolio Social', icon: 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z' },
      { id: 'communication', label: 'Communiqués', icon: 'M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z' },
      { id: 'affectations', label: 'Affectations (Devoirs)', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4' },
      { id: 'notes', label: 'Cahier de Notes', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
      { id: 'bulletins', label: 'Bulletins Pédagogiques', icon: 'M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
      { id: 'library', label: 'Bibliothèque', icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' },
      { id: 'timetable', label: 'Emploi du Temps', icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' },
      { id: 'courses', label: 'Cours & IB Map', icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9' }
    ];

    // ==========================================
    // LOGIQUE INTERNE & RESEAU
    // ==========================================
    function toggleLoader(show) { document.getElementById('loader').classList[show ? 'remove' : 'add']('hidden'); }

    async function callBackend(action, payload) {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action, payload }) });
      return await res.json();
    }

    async function handleLogin(e) {
      e.preventDefault();
      toggleLoader(true);
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      
      try {
        const response = await callBackend('authenticateUser', { email, password });
        if (response.success) {
          currentUser = response.user;
          myChildId = currentUser.related_student_id || null;
          await refreshData();
          
          document.getElementById('authPortal').classList.add('hidden');
          document.getElementById('appContainer').classList.remove('hidden');
          
          document.getElementById('userNameDisplay').textContent = currentUser.name;
          document.getElementById('userRoleBadge').textContent = currentUser.role;
          document.getElementById('userAvatar').src = currentUser.profile_image || 'https://placehold.co/150';
          
          renderSidebar();
          routeView('dashboard');
        } else {
          const errBox = document.getElementById('authErrorMessage');
          errBox.textContent = response.message;
          errBox.classList.remove('hidden');
        }
      } catch (err) { alert("Connexion serveur échouée."); }
      toggleLoader(false);
    }

    async function refreshData() {
      const res = await callBackend('getLMSData', {});
      lmsData = res.data;
    }

    async function changeProfilePhoto() {
      const url = prompt("Veuillez coller le lien (URL) de votre nouvelle photo de profil :");
      if (url) {
        toggleLoader(true);
        await callBackend('updateProfilePhoto', { userId: currentUser.id, newImageUrl: url });
        document.getElementById('userAvatar').src = url;
        currentUser.profile_image = url;
        toggleLoader(false);
      }
    }

    async function submitForm(e, sheetName, payloadObj, viewId) {
      e.preventDefault();
      toggleLoader(true);
      const res = await callBackend('postData', { sheetName, data: payloadObj });
      if(res.success) {
        await refreshData();
        routeView(viewId);
      } else {
        alert("Erreur lors de l'enregistrement : " + res.error);
      }
      toggleLoader(false);
    }

    function renderSidebar() {
      const nav = document.getElementById('navModules');
      nav.innerHTML = '';
      modules.forEach(m => {
        const btn = document.createElement('button');
        btn.id = `btn-${m.id}`;
        btn.className = `w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold tracking-wide transition-all text-slate-400 hover:text-white hover:bg-white/5`;
        btn.innerHTML = `<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${m.icon}"></path></svg> <span class="text-left truncate">${m.label}</span>`;
        btn.onclick = () => routeView(m.id);
        nav.appendChild(btn);
      });
    }

    function routeView(viewId) {
      document.querySelectorAll('#navModules button').forEach(b => {
        b.classList.remove('bg-cyan-500/10', 'text-cyan-400', 'border', 'border-cyan-500/30');
      });
      const activeBtn = document.getElementById(`btn-${viewId}`);
      if(activeBtn) activeBtn.classList.add('bg-cyan-500/10', 'text-cyan-400', 'border', 'border-cyan-500/30');
      
      const titleConfig = modules.find(m => m.id === viewId);
      document.getElementById('viewTitle').textContent = titleConfig ? titleConfig.label : 'Vue';
      
      const container = document.getElementById('viewContainer');
      container.innerHTML = '';
      container.classList.remove('fade-in');
      void container.offsetWidth; 
      container.classList.add('fade-in');

      if (viewId === 'dashboard') renderDashboard(container);
      if (viewId === 'portfolio') renderPortfolio(container);
      if (viewId === 'communication') renderCommunication(container);
      if (viewId === 'affectations') renderAffectations(container);
      if (viewId === 'notes') renderNotes(container);
      if (viewId === 'bulletins') renderBulletins(container);
      if (viewId === 'library') renderLibrary(container);
      if (viewId === 'timetable') renderTimetable(container);
      if (viewId === 'courses') renderCourses(container);
    }

    function getMyClasses() {
      if (currentUser.role === 'admin') return lmsData.classes.map(c => c.id);
      if (currentUser.role === 'teacher') return currentUser.class_id ? currentUser.class_id.split(',') : [];
      if (currentUser.role === 'student') return [currentUser.class_id];
      if (currentUser.role === 'parent') {
        const child = lmsData.users.find(u => u.id === myChildId);
        return child ? [child.class_id] : [];
      }
      return [];
    }

    // ==========================================
    // RENDU DES MODULES & VUES
    // ==========================================

    function renderDashboard(container) {
      container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="glass p-6 rounded-2xl border-l-4 border-cyan-500">
            <h4 class="text-sm text-slate-400 font-bold uppercase tracking-wider mb-2">Statut Serveur</h4>
            <div class="text-3xl font-extrabold text-white">Opérationnel</div>
          </div>
          <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
            <h4 class="text-sm text-slate-400 font-bold uppercase tracking-wider mb-2">Devoirs Actifs</h4>
            <div class="text-3xl font-extrabold text-white">${lmsData.assignments.length}</div>
          </div>
          <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500">
            <h4 class="text-sm text-slate-400 font-bold uppercase tracking-wider mb-2">Profil Élite</h4>
            <div class="text-xl font-extrabold text-white uppercase">${currentUser.role}</div>
          </div>
        </div>
        <div class="glass p-6 rounded-3xl h-96 relative">
          <h3 class="text-lg font-bold text-white mb-4 absolute z-10">Activité de la Plateforme</h3>
          <canvas id="mainChart"></canvas>
        </div>
      `;

      if(chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('mainChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
          datasets: [{
            label: 'Interactions Numériques',
            data: [25, 40, 35, 55, 48, 70, 95],
            borderColor: '#06b6d4',
            backgroundColor: 'rgba(6, 182, 212, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
      });
    }

    function renderPortfolio(container) {
      const myClasses = getMyClasses();
      const visiblePosts = currentUser.role === 'admin' ? lmsData.portfolio : lmsData.portfolio.filter(p => myClasses.includes(p.class_id));
      
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2071&auto=format&fit=crop');"><div class="rubric-title">Portfolio Social</div></div>`;

      if (['admin', 'teacher', 'student'].includes(currentUser.role)) {
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <h4 class="font-bold text-white mb-4">Créer un Post</h4>
            <form id="frmPort" class="space-y-4">
              <input type="text" id="pTitle" placeholder="Titre du projet..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-cyan-500" required>
              <textarea id="pContent" placeholder="Description du projet..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-cyan-500" required></textarea>
              <input type="url" id="pImg" placeholder="Lien de l'image ou vidéo..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-cyan-500" required>
              <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-xl transition-all">Publier</button>
            </form>
          </div>
        `;
      }

      html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
      visiblePosts.forEach(post => {
        html += `
          <div class="glass rounded-2xl overflow-hidden border border-slate-700 group hover:border-cyan-500/50 transition-all">
            <img src="${post.media_url}" class="w-full h-48 object-cover">
            <div class="p-5">
              <h4 class="text-xl font-bold text-white mb-2">${post.title}</h4>
              <p class="text-sm text-slate-400 mb-4">${post.content}</p>
              <div class="flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest border-t border-slate-700 pt-3">
                <span>Par: ${post.author_id}</span>
                <span class="text-cyan-400">❤️ ${post.likes || 0}</span>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;

      const form = document.getElementById('frmPort');
      if (form) form.onsubmit = (e) => submitForm(e, 'Portfolio', {
        author_id: currentUser.id,
        class_id: myClasses[0] || 'C-101', 
        type: 'image',
        media_url: document.getElementById('pImg').value,
        title: document.getElementById('pTitle').value,
        content: document.getElementById('pContent').value,
        likes: 0
      }, 'portfolio');
    }

    function renderCommunication(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1577563908411-5077b6dc7624?q=80&w=2070&auto=format&fit=crop');"><div class="rubric-title">Centre de Communication</div></div>`;
      
      if (['admin', 'teacher'].includes(currentUser.role)) {
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <h4 class="font-bold text-white mb-4">Diffuser un Communiqué</h4>
            <form id="frmAnn" class="space-y-4">
              <input type="text" id="aTitle" placeholder="Titre" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <textarea id="aContent" placeholder="Message..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required></textarea>
              <select id="aTarget" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none"><option value="all">Tous</option><option value="teacher">Professeurs</option><option value="parent">Parents</option><option value="student">Élèves</option></select>
              <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-xl transition-all">Envoyer</button>
            </form>
          </div>
        `;
      }

      html += `<div class="space-y-4">`;
      lmsData.announcements.forEach(ann => {
        if (ann.target_audience === 'all' || ann.target_audience === currentUser.role || currentUser.role === 'admin') {
          html += `
            <div class="glass p-6 rounded-2xl border border-slate-700">
              <div class="flex justify-between items-start mb-2">
                <h4 class="text-xl font-bold text-white">${ann.title}</h4>
                <span class="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded font-bold">${ann.date || ''}</span>
              </div>
              <p class="text-slate-300 text-sm whitespace-pre-line">${ann.content}</p>
            </div>
          `;
        }
      });
      container.innerHTML = html + `</div>`;

      const form = document.getElementById('frmAnn');
      if(form) form.onsubmit = (e) => submitForm(e, 'Announcements', {
        title: document.getElementById('aTitle').value,
        content: document.getElementById('aContent').value,
        author_id: currentUser.id,
        target_audience: document.getElementById('aTarget').value,
        image_header: ''
      }, 'communication');
    }

    function renderAffectations(container) {
      const myClasses = getMyClasses();
      const visibleAss = currentUser.role === 'admin' ? lmsData.assignments : lmsData.assignments.filter(a => myClasses.includes(a.class_id));

      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?q=80&w=2070&auto=format&fit=crop');"><div class="rubric-title">Affectations (Devoirs)</div></div>`;

      if (['admin', 'teacher'].includes(currentUser.role)) {
        let clsOpts = lmsData.classes.filter(c => currentUser.role === 'admin' || myClasses.includes(c.id)).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        let unitOpts = lmsData.curriculumMaps.map(u => `<option value="${u.id}">${u.unit_focus} (${u.framework})</option>`).join('');
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <h4 class="font-bold text-white mb-4">Créer une Affectation</h4>
            <form id="frmAss" class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <input type="text" id="asTitle" placeholder="Titre" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
                <input type="date" id="asDue" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <select id="asClass" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">${clsOpts}</select>
                <select id="asUnit" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">${unitOpts}</select>
              </div>
              <textarea id="asDesc" placeholder="Instructions..." class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required></textarea>
              <input type="url" id="asLink" placeholder="Lien Document Google Drive / Web (PDF/Word)" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">
              <button type="submit" class="bg-cyan-600 text-white font-bold py-2 px-6 rounded-xl">Assigner</button>
            </form>
          </div>
        `;
      }

      html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
      visibleAss.forEach(ass => {
        html += `
          <div class="glass p-6 rounded-2xl border border-slate-700 flex flex-col justify-between">
            <div>
              <div class="flex justify-between mb-3"><h4 class="text-xl font-bold text-white">${ass.title}</h4> <span class="bg-rose-500/20 text-rose-400 text-xs px-2 py-1 rounded font-bold">Délai: ${ass.due_date}</span></div>
              <p class="text-sm text-slate-300 mb-4">${ass.description}</p>
            </div>
            ${ass.drive_resource_link ? `<a href="${ass.drive_resource_link}" target="_blank" class="text-cyan-400 text-sm hover:underline font-bold mb-4 inline-block">📄 Ressources associées</a>` : ''}
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;

      const form = document.getElementById('frmAss');
      if(form) form.onsubmit = (e) => {
        // Conversion de la date HTML (AAAA-MM-JJ) au format institutionnel (JJ/MM/AAAA)
        const rawDate = document.getElementById('asDue').value;
        const formattedDate = rawDate.split('-').reverse().join('/');
        
        submitForm(e, 'Assignments', {
          title: document.getElementById('asTitle').value,
          due_date: formattedDate,
          class_id: document.getElementById('asClass').value,
          unit_id: document.getElementById('asUnit').value,
          description: document.getElementById('asDesc').value,
          drive_resource_link: document.getElementById('asLink').value
        }, 'affectations');
      };
    }

    function renderNotes(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=2022&auto=format&fit=crop');"><div class="rubric-title">Cahier de Notes</div></div>`;
      
      const visibleGrades = lmsData.grades.filter(g => {
        if (currentUser.role === 'admin' || currentUser.role === 'teacher') return true;
        if (currentUser.role === 'student') return g.student_id === currentUser.id;
        if (currentUser.role === 'parent') return g.student_id === myChildId;
        return false;
      });

      if (['admin', 'teacher'].includes(currentUser.role)) {
        let stdOpts = lmsData.users.filter(u => u.role === 'student').map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        let assOpts = lmsData.assignments.map(a => `<option value="${a.id}">${a.title}</option>`).join('');
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <h4 class="font-bold text-white mb-4">Saisir une Note institutionnelle</h4>
            <form id="frmGrade" class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <select id="gStd" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">${stdOpts}</select>
              <select id="gAss" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">${assOpts}</select>
              <input type="text" id="gScore" placeholder="Note (ex: 18/20)" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <input type="text" id="gFeed" placeholder="Appréciation pédagogique..." class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <button type="submit" class="md:col-span-2 bg-emerald-600 text-white font-bold py-2 rounded-xl">Enregistrer la Note</button>
            </form>
          </div>
        `;
      }

      html += `<div class="glass rounded-2xl overflow-hidden border border-slate-700"><table class="w-full text-left text-sm text-slate-300"><thead class="bg-slate-900/80 text-white uppercase text-[10px] tracking-wider"><tr><th class="p-4">Élève</th><th class="p-4">Affectation</th><th class="p-4">Note</th><th class="p-4">Appréciation</th></tr></thead><tbody class="divide-y divide-slate-700/50">`;
      
      visibleGrades.forEach(g => {
        let sName = lmsData.users.find(u=>u.id === g.student_id)?.name || g.student_id;
        let aTitle = lmsData.assignments.find(a=>a.id === g.assignment_id)?.title || g.assignment_id;
        html += `<tr><td class="p-4 font-bold text-white">${sName}</td><td class="p-4">${aTitle}</td><td class="p-4 text-emerald-400 font-bold">${g.score}</td><td class="p-4">${g.feedback_comments}</td></tr>`;
      });
      container.innerHTML = html + `</tbody></table></div>`;

      const form = document.getElementById('frmGrade');
      if(form) form.onsubmit = (e) => submitForm(e, 'Grades', {
        student_id: document.getElementById('gStd').value,
        assignment_id: document.getElementById('gAss').value,
        score: document.getElementById('gScore').value,
        feedback_comments: document.getElementById('gFeed').value
      }, 'notes');
    }

    function renderBulletins(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2070&auto=format&fit=crop');"><div class="rubric-title">Bulletins Officiels</div></div>`;
      
      const visibleBull = lmsData.bulletins.filter(b => {
        if (currentUser.role === 'admin') return true;
        if (currentUser.role === 'student') return b.student_id === currentUser.id;
        if (currentUser.role === 'parent') return b.student_id === myChildId;
        return false;
      });

      if (currentUser.role === 'admin') {
        let stdOpts = lmsData.users.filter(u => u.role === 'student').map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <h4 class="font-bold text-white mb-4">Uploader un Bulletin</h4>
            <form id="frmBull" class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <select id="bStd" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none">${stdOpts}</select>
              <input type="text" id="bTerm" placeholder="Trimestre (ex: Trimestre 1)" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <input type="url" id="bLink" placeholder="Lien PDF" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <button type="submit" class="md:col-span-3 bg-purple-600 text-white font-bold py-2 rounded-xl">Publier Bulletin</button>
            </form>
          </div>
        `;
      }

      html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
      visibleBull.forEach(b => {
        let sName = lmsData.users.find(u=>u.id === b.student_id)?.name || b.student_id;
        html += `
          <div class="glass p-6 rounded-2xl border border-slate-700 text-center hover:bg-slate-800/50 transition-all">
            <div class="text-4xl mb-4">📄</div>
            <h4 class="text-lg font-bold text-white">${sName}</h4>
            <p class="text-sm text-cyan-400 font-bold mb-4">${b.term}</p>
            <a href="${b.pdf_link}" target="_blank" class="block w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-sm font-bold">Ouvrir le PDF</a>
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;

      const form = document.getElementById('frmBull');
      if(form) form.onsubmit = (e) => submitForm(e, 'Bulletins', {
        student_id: document.getElementById('bStd').value, 
        term: document.getElementById('bTerm').value, 
        pdf_link: document.getElementById('bLink').value
      }, 'bulletins');
    }

    function renderLibrary(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2190&auto=format&fit=crop');"><div class="rubric-title">Bibliothèque Numérique</div></div>`;
      
      if (currentUser.role === 'admin') {
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <form id="frmLib" class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input type="text" id="lTitle" placeholder="Titre Ressource" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <input type="text" id="lCat" placeholder="Catégorie" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <input type="url" id="lImg" placeholder="Lien Image Header" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <input type="url" id="lLink" placeholder="Lien Ressource (PDF/Vidéo)" class="bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required>
              <textarea id="lDesc" placeholder="Description..." class="md:col-span-2 bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-white outline-none" required></textarea>
              <button type="submit" class="md:col-span-2 bg-blue-600 text-white font-bold py-2 rounded-xl">Ajouter aux Collections</button>
            </form>
          </div>
        `;
      }

      html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
      lmsData.library.forEach(lib => {
        html += `
          <div class="glass rounded-2xl overflow-hidden border border-slate-700">
            <img src="${lib.image_header}" class="w-full h-32 object-cover">
            <div class="p-5">
              <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-wider">${lib.category}</span>
              <h4 class="text-lg font-bold text-white my-2">${lib.title}</h4>
              <p class="text-xs text-slate-400 mb-4 line-clamp-2">${lib.description}</p>
              <a href="${lib.resource_link}" target="_blank" class="text-sm font-bold text-white bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700 block text-center">Accéder au support ↗</a>
            </div>
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;

      const form = document.getElementById('frmLib');
      if(form) form.onsubmit = (e) => submitForm(e, 'Library', {
        title: document.getElementById('lTitle').value, 
        category: document.getElementById('lCat').value, 
        image_header: document.getElementById('lImg').value, 
        resource_link: document.getElementById('lLink').value, 
        description: document.getElementById('lDesc').value
      }, 'library');
    }

    function renderTimetable(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1492538368677-f6e0afe31dcc?q=80&w=2070&auto=format&fit=crop');"><div class="rubric-title">Emploi du Temps</div></div>`;
      
      const myClasses = getMyClasses();
      const visibleTT = currentUser.role === 'admin' ? lmsData.timetable : lmsData.timetable.filter(t => myClasses.includes(t.class_id));

      if (['admin', 'teacher'].includes(currentUser.role)) {
        let clsOpts = lmsData.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        html += `
          <div class="glass p-6 rounded-2xl mb-8 border border-slate-700">
            <form id="frmTT" class="grid grid-cols-2 md:grid-cols-5 gap-4">
              <select id="ttClass" class="bg-slate-900/50 border border-slate-700 p-2 rounded-xl text-white outline-none">${clsOpts}</select>
              <select id="ttDay" class="bg-slate-900/50 border border-slate-700 p-2 rounded-xl text-white outline-none"><option>Lundi</option><option>Mardi</option><option>Mercredi</option><option>Jeudi</option><option>Vendredi</option></select>
              <input type="time" id="ttStart" class="bg-slate-900/50 border border-slate-700 p-2 rounded-xl text-white outline-none" required>
              <input type="time" id="ttEnd" class="bg-slate-900/50 border border-slate-700 p-2 rounded-xl text-white outline-none" required>
              <input type="text" id="ttSub" placeholder="Matière" class="bg-slate-900/50 border border-slate-700 p-2 rounded-xl text-white outline-none" required>
              <button type="submit" class="col-span-2 md:col-span-5 bg-cyan-600 text-white font-bold py-2 rounded-xl">Ajouter Créneau</button>
            </form>
          </div>
        `;
      }

      html += `<div class="glass p-6 rounded-2xl border border-slate-700"><div class="grid grid-cols-1 gap-2">`;
      visibleTT.forEach(tt => {
        html += `
          <div class="bg-slate-800/50 p-4 rounded-xl flex justify-between items-center border border-slate-700/50">
            <div class="flex gap-4 items-center">
              <div class="bg-slate-900 text-cyan-400 font-bold px-3 py-2 rounded-lg text-sm">${tt.day_of_week}</div>
              <div><h4 class="font-bold text-white">${tt.subject}</h4><p class="text-xs text-slate-400">${tt.start_time} - ${tt.end_time}</p></div>
            </div>
            <div class="text-xs text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">${tt.class_id}</div>
          </div>
        `;
      });
      container.innerHTML = html + `</div></div>`;

      const form = document.getElementById('frmTT');
      if(form) form.onsubmit = (e) => submitForm(e, 'Timetable', {
        class_id: document.getElementById('ttClass').value, 
        day_of_week: document.getElementById('ttDay').value, 
        start_time: document.getElementById('ttStart').value, 
        end_time: document.getElementById('ttEnd').value, 
        subject: document.getElementById('ttSub').value, 
        teacher_id: currentUser.id
      }, 'timetable');
    }

    function renderCourses(container) {
      let html = `<div class="rubric-header" style="background-image: url('https://images.unsplash.com/photo-1501504905252-473c47e087f8?q=80&w=1974&auto=format&fit=crop');"><div class="rubric-title">Architecture des Cours</div></div>`;
      
      html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">`;
      lmsData.courses.forEach(c => {
        html += `
          <div class="glass p-6 rounded-2xl border border-slate-700 border-l-4 border-l-purple-500">
            <span class="text-[10px] uppercase font-bold tracking-widest text-purple-400">${c.subject_group}</span>
            <h4 class="text-lg font-bold text-white mt-1">${c.course_name}</h4>
            <span class="inline-block mt-3 text-xs bg-slate-800 px-2 py-1 rounded text-slate-300">Niveau: ${c.program_level}</span>
          </div>
        `;
      });
      html += `</div>`;
      
      html += `<h4 class="text-2xl font-bold text-white mb-6">Cartes Curriculaires IB</h4><div class="grid grid-cols-1 gap-4">`;
      lmsData.curriculumMaps.forEach(m => {
        html += `
          <div class="glass p-5 rounded-2xl border border-slate-700">
            <div class="flex items-center gap-3 mb-2"><span class="bg-cyan-500/20 text-cyan-400 font-bold px-2 py-1 rounded text-xs">${m.framework}</span><span class="text-sm font-bold text-slate-300">${m.theme_or_context}</span></div>
            <h4 class="text-lg font-bold text-white">${m.unit_focus}</h4>
            <p class="text-sm text-slate-400 mt-2">${m.objectives}</p>
          </div>
        `;
      });
      container.innerHTML = html + `</div>`;
    }
  </script>
</body>
</html>
