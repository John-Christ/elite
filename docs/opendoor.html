<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation JPO - ELITE</title>
    <style>
        :root {
            --primary: #1a3a5f; /* Bleu Élite */
            --accent: #c5a059; /* Or/Bronze */
            --bg: #f4f7f9;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--primary);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #122a46;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>ELITE</h1>
        <p>Journée Porte Ouverte - Confirmation</p>
    </div>

    <form id="jpoForm">
        <div class="form-group">
            <label>Nom complet du Parent</label>
            <input type="text" name="parentName" placeholder="Ex: M. Jean Dupont" required>
        </div>

        <div class="form-group">
            <label>Nom & Prénom de l'enfant / des enfants</label>
            <input type="text" name="childNames" placeholder="Ex: Sarah et Marc" required>
        </div>

        <div class="form-group">
            <label>Email de contact</label>
            <input type="email" name="email" placeholder="votre@email.com" required>
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" name="phone" placeholder="06x xx xx xx" required>
        </div>

        <div class="form-group">
            <label>Nombre de participants</label>
            <select name="guests">
                <option value="1">1 Personne</option>
                <option value="2">2 Personnes</option>
                <option value="3">3 Personnes</option>
                <option value="4+">4 Personnes ou plus</option>
            </select>
        </div>

        <button type="submit" class="btn" id="submitBtn">Confirmer ma présence</button>
        <div id="status"></div>
    </form>
</div>

<script>
    // REMPLACEZ PAR VOTRE URL WEB APP GOOGLE APPS SCRIPT
    const scriptURL = 'VOTRE_URL_SCRIPT_ICI';
    const form = document.getElementById('jpoForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Envoi en cours...';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                status.style.display = 'block';
                status.style.backgroundColor = '#d4edda';
                status.style.color = '#155724';
                status.innerText = 'Succès ! Votre présence a été enregistrée.';
                form.reset();
                btn.disabled = false;
                btn.innerText = 'Confirmer ma présence';
            })
            .catch(error => {
                status.style.display = 'block';
                status.style.backgroundColor = '#f8d7da';
                status.style.color = '#721c24';
                status.innerText = 'Erreur technique. Veuillez réessayer.';
                btn.disabled = false;
                btn.innerText = 'Confirmer ma présence';
            });
    });
</script>

</body>
</html>
